<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UrBackup ZFS iSCSI Restore</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem auto; max-width: 920px; line-height: 1.5; }
      form, .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
      button { padding: 0.5rem 1rem; cursor: pointer; }
      #status { white-space: pre-wrap; background: #f6f8fa; padding: 1rem; border-radius: 8px; }
      select, input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; margin-bottom: 0.75rem; }
      .row { display: flex; gap: 1rem; }
      .row > div { flex: 1; }
    </style>
  </head>
  <body>
    <h1>UrBackup ZFS Snapshot Restore</h1>
    <p>This app lists ZFS snapshots for a backup path, clones the selected snapshot into a restore location, finds the .raw image, and provisions a TrueNAS iSCSI extent.</p>

    <div class="card">
      <div class="row">
        <div>
          <label for="backup_path">Backups path</label>
          <input id="backup_path" value="{{ backup_path }}" placeholder="/mnt/tank/urbackup" readonly />
        </div>
        <div>
          <label for="restore_path">Restore path</label>
          <input id="restore_path" value="{{ restore_path }}" placeholder="/mnt/tank/restore" readonly />
        </div>
      </div>
      <button id="refreshButton" type="button">Refresh snapshots</button>
    </div>

    <div class="card">
      <label for="clientSelect">Client</label>
      <select id="clientSelect"></select>
    </div>

    <div class="card">
      <label for="snapshotSelect">Snapshot</label>
      <select id="snapshotSelect"></select>
      <label for="blocksizeSelect">Block size</label>
      <select id="blocksizeSelect">
        <option value="512">512</option>
        <option value="4096">4096</option>
      </select>
      <button id="restoreButton" type="button">Restore snapshot</button>
      <button id="cleanupButton" type="button">Clean up last restore</button>
    </div>

    <div id="status">Loading…</div>

    <script>
      const statusNode = document.getElementById('status');
      const snapshotSelect = document.getElementById('snapshotSelect');
      const clientSelect = document.getElementById('clientSelect');
      const backupPathInput = document.getElementById('backup_path');
      const restorePathInput = document.getElementById('restore_path');
      const blocksizeSelect = document.getElementById('blocksizeSelect');

      async function setStatus(message) {
        statusNode.textContent = message;
      }

      async function refreshClients() {
        const backupPath = backupPathInput.value;
        clientSelect.innerHTML = '';
        clientSelect.disabled = true;
        const response = await fetch(`/api/clients?backup_path=${encodeURIComponent(backupPath)}`);
        const data = await response.json();
        if (data.clients.length === 0) {
          const option = document.createElement('option');
          option.textContent = 'No clients found';
          clientSelect.appendChild(option);
          return;
        }
        for (const client of data.clients) {
          const option = document.createElement('option');
          option.value = client;
          option.textContent = client;
          clientSelect.appendChild(option);
        }
        if (data.clients.length > 0) {
          clientSelect.value = data.clients[0];
          await refreshSnapshots();
        }
        clientSelect.disabled = false;
      }

      async function refreshSnapshots() {
        const backupPath = backupPathInput.value;
        const clientSubdir = clientSelect.value || '';
        setStatus('Loading snapshots…');
        const response = await fetch(`/api/snapshots?backup_path=${encodeURIComponent(backupPath)}&client_subdir=${encodeURIComponent(clientSubdir)}`);
        const data = await response.json();
        snapshotSelect.innerHTML = '';
        if (data.error) {
          const option = document.createElement('option');
          option.textContent = data.error;
          snapshotSelect.appendChild(option);
          setStatus(data.error);
          return;
        }
        if (data.snapshots.length === 0) {
          const option = document.createElement('option');
          option.textContent = 'No snapshots found';
          snapshotSelect.appendChild(option);
          setStatus('No snapshots found for the supplied path and client.');
          return;
        }
        for (const snapshot of data.snapshots) {
          const option = document.createElement('option');
          option.value = snapshot;
          option.textContent = snapshot;
          snapshotSelect.appendChild(option);
        }
        setStatus(`Loaded ${data.snapshots.length} snapshots.`);
      }

      document.getElementById('refreshButton').onclick = async () => {
        await refreshClients();
        await refreshSnapshots();
      };

      clientSelect.onchange = refreshSnapshots;

      document.getElementById('restoreButton').onclick = async () => {
        const backupPath = document.getElementById('backup_path').value;
        const restorePath = document.getElementById('restore_path').value;
        const snapshotName = snapshotSelect.value;
        const clientSubdir = clientSelect.value || '';
        setStatus('Starting restore…');
        const blocksize = blocksizeSelect.value;
        const response = await fetch('/api/restore', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ backup_path: backupPath, restore_path: restorePath, snapshot_name: snapshotName, client_subdir: clientSubdir, blocksize })
        });
        const data = await response.json();
        if (!response.ok) {
          setStatus(JSON.stringify(data, null, 2));
          return;
        }
        setStatus(JSON.stringify(data, null, 2));
      };

      document.getElementById('cleanupButton').onclick = async () => {
        const response = await fetch('/api/cleanup', { method: 'POST' });
        const data = await response.json();
        setStatus(JSON.stringify(data, null, 2));
      };

      refreshClients().then(refreshSnapshots);
    </script>
  </body>
</html>
